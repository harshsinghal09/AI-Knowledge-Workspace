version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: akw-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: akw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  python-ai:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: akw-python-ai
    restart: unless-stopped
    env_file:
      - ./python-ai/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/ai_knowledge_workspace
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      # Must match the server's mount below at the same path — Node saves
      # uploaded files here and passes that absolute path to Python for
      # indexing, so both containers need to see the same directory.
      - ./server/uploads:/app/uploads

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    container_name: akw-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/ai_knowledge_workspace
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHON_AI_URL: http://python-ai:8000
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      - mongo
      - redis
      - python-ai
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    container_name: akw-client
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  mongo-data:
  redis-data:
